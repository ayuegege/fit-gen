name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Build EXE
      run: |
        pip install pyinstaller
        pyinstaller FitGen_Windows.spec --clean
    
    - name: Create distribution package
      run: |
        mkdir FitGen-Package
        copy dist\FitGen.exe FitGen-Package\
        xcopy /E /I backend FitGen-Package\backend\
        xcopy /E /I frontend FitGen-Package\frontend\
        copy requirements.txt FitGen-Package\
        copy install_dependencies.bat FitGen-Package\
        copy 使用说明.txt FitGen-Package\
    
    - name: Zip package
      run: |
        cd FitGen-Package
        7z a -tzip ../FitGen-Windows.zip *
        cd ..
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: FitGen-Windows.zip
        generate_release_notes: true
        name: FitGen Windows v${{ github.run_number }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
