name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install pyinstaller
        pip install fastapi uvicorn streamlit aiohttp pillow requests pydantic starlette
        pip install pandas numpy altair tornado click blinker cachetools
    
    - name: Build EXE
      run: pyinstaller FitGen_Windows.spec --clean
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/FitGen.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
